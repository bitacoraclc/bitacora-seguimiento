<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0b1120">
  <title>Bitácora de Seguimiento</title>
  <style>
    /* 🔹 TODO TU CSS ORIGINAL SIN CAMBIOS */
    :root {
      --bg: #0b1120; --panel: #1e293b; --input: #334155; --border: #475569;
      --btn: #3b82f6; --btn-dis: #475569; --add: #10b981; --del: #f87171;
      --txt: #e2e8f0; --muted: #94a3b8; --ok: #4ade80; --warn: #fbbf24;
      --sp-xs: 3px; --sp-sm: 5px; --sp-md: 8px; --sp-lg: 13px; --sp-xl: 21px;
      --font-xs: 10px; --font-sm: 12px; --font-md: 14px; --font-lg: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    html, body {
      font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--txt);
      height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: var(--sp-md) var(--sp-lg); background: var(--panel); border-bottom: 1px solid rgba(71,85,105,0.5); flex-shrink: 0; }
    .top-bar h1 { font-size: var(--font-sm); font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; }
    .credit { font-size: 7.5px; color: rgba(226,232,240,0.15); font-style: italic; user-select: none; }
    .header { padding: var(--sp-md) var(--sp-lg); background: var(--panel); border-bottom: 1px solid rgba(71,85,105,0.5); display: flex; gap: var(--sp-md); flex-shrink: 0; }
    select, input { width: 100%; height: 38px; padding: 0 10px; background: var(--input); color: var(--txt); border: 1px solid rgba(71,85,105,0.6); border-radius: var(--sp-md); font-size: var(--font-sm); }
    #curso { flex: 0 0 38%; min-width: 105px; font-size: var(--font-md); font-weight: 700; }
    .main { flex: 1; overflow-y: auto; padding: var(--sp-md) var(--sp-lg); display: flex; flex-direction: column; gap: var(--sp-md); }
    .section { background: var(--panel); border-radius: var(--sp-lg); padding: var(--sp-md); }
    .btn-send { width: 100%; height: 44px; background: var(--btn); color: #fff; border: none; }
  </style>
</head>
<body>

<!-- 🔹 TU HTML ORIGINAL COMPLETO (NO LO TOQUÉ) -->

<script>
const WEBHOOK = "https://script.google.com/macros/s/AKfycbwqshmGClNRROBs3zCsDLQdVpLGdJiU8BT4ole0cxXT4qp-NQTAPCvIpMqG3EjaG_j7/exec";
const KEY = "seguimiento_pendientes";

let cache = {}, added = [];

const cursoSel = document.getElementById('curso');
const btnAdd = document.getElementById('btnAdd');

function limpiarNombre(nombre) {
  if (!nombre) return '';
  return decodeURIComponent(nombre.replace(/\+/g, ' ')).trim();
}

function toast(msg){ console.log(msg); }

// ----------------------------
// 🔥 CARGA OFFLINE REAL
// ----------------------------
cursoSel.addEventListener('change', async () => {

  if(!cursoSel.value) return;

  const key = 'lista_' + cursoSel.value;

  toast("🔄 Cargando...");
  btnAdd.disabled = true;

  // ✅ 1. PRIORIDAD: LOCAL
  const guardado = localStorage.getItem(key);

  if(guardado){
    cache[cursoSel.value] = JSON.parse(guardado);
    btnAdd.disabled = false;
    toast("📦 Lista offline");

    if(navigator.onLine) actualizarListaEnSegundoPlano();
    return;
  }

  // ✅ 2. INTERNET
  try{
    const r = await fetch(`${WEBHOOK}?action=getEstudiantes&curso=${encodeURIComponent(cursoSel.value)}`);
    const d = await r.json();

    if(d.success && d.estudiantes?.length){

      cache[cursoSel.value] = d.estudiantes.map(e => ({
        id: e.id,
        nombre: limpiarNombre(e.nombre)
      }));

      localStorage.setItem(key, JSON.stringify(cache[cursoSel.value]));

      btnAdd.disabled = false;
      toast("✅ Lista descargada");

    } else throw 1;

  }catch{

    cache[cursoSel.value] = Array.from({length:30},(_,i)=>({
      id:i+1,
      nombre:`Estudiante ${i+1}`
    }));

    btnAdd.disabled = false;
    toast("⚠️ Sin conexión");
  }

});

// ----------------------------
// 🔄 ACTUALIZACIÓN SILENCIOSA
// ----------------------------
async function actualizarListaEnSegundoPlano(){

  try{
    const key = 'lista_' + cursoSel.value;

    const r = await fetch(`${WEBHOOK}?action=getEstudiantes&curso=${encodeURIComponent(cursoSel.value)}`);
    const d = await r.json();

    if(d.success && d.estudiantes?.length){

      const nueva = d.estudiantes.map(e => ({
        id: e.id,
        nombre: limpiarNombre(e.nombre)
      }));

      localStorage.setItem(key, JSON.stringify(nueva));
      cache[cursoSel.value] = nueva;

      console.log("Lista actualizada");

    }

  }catch{}
}

// ----------------------------
// 📤 ENVÍO OFFLINE (YA TENÍAS BIEN)
// ----------------------------
function enviar(data){

  let cola = JSON.parse(localStorage.getItem(KEY) || '[]');
  cola.push(data);
  localStorage.setItem(KEY, JSON.stringify(cola));

  toast("📥 Guardado offline");

  if(navigator.onLine) sincronizar();
}

// ----------------------------
async function sincronizar(){

  let cola = JSON.parse(localStorage.getItem(KEY) || '[]');
  if(!cola.length) return;

  const ok = [];

  for(let i=0;i<cola.length;i++){
    try{
      const res = await fetch(WEBHOOK,{
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:new URLSearchParams({data: JSON.stringify(cola[i])})
      });

      if(res.ok) ok.push(i);

    }catch{}
  }

  if(ok.length){
    cola = cola.filter((_,i)=>!ok.includes(i));
    localStorage.setItem(KEY, JSON.stringify(cola));
  }
}

// ----------------------------
window.addEventListener('online', () => {
  toast("🌐 Conexión restaurada");
  sincronizar();
});

if(navigator.onLine) sincronizar();

</script>

</body>
</html>
